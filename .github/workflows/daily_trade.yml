name: Equity Risk Premium Monitor Bot

on:
  schedule:
    # 每天 18:30 运行 (北京时间 18:30 = UTC 10:30)
    - cron: '30 10 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  run-erp-strategy:
    runs-on: ubuntu-latest
    
    # --- ADD THIS SECTION ---
    permissions:
      contents: write  # Allows the bot to push changes to the repo
    # ------------------------

    steps:
      # 1. 检出代码 (升级到 v4)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境 (升级到 v5)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 执行增量抓取数据
      - name: Fetch Data
        run: python fetch_bond_yield_incremental.py

      # 5. 执行分析并推送到微信
      - name: Analyze and Push to WeChat
        run: python erp_position.py

      # 6. 将更新后的数据保存回 GitHub 仓库
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto update ERP data [skip ci]" || exit 0
          git push
