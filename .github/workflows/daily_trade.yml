name: Equity Risk Premium Monitor Bot
on:
  schedule:
    # 每天 18:30 运行 (北京时间 18:30 = UTC 10:30)
    - cron: '30 10 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '预览模式（只生成报告文件，不推送微信）'
        type: boolean
        default: false

jobs:
  run-erp-strategy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 执行增量抓取数据
      - name: Fetch Data
        env:
          QQQ_PE_TODAY: ${{ secrets.QQQ_PE_TODAY }}
        run: python fetch_bond_yield_incremental.py

      # 5. 执行分析，正式运行推送微信，预览模式写文件不推送
      - name: Analyze and Push to WeChat
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python erp_position.py

      # 6. 预览模式：上传报告文件供下载查看
      - name: Upload preview report
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: report-preview
          path: output_preview.md

      # 7. 将更新后的数据保存回 GitHub 仓库
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto update ERP data [skip ci]" || exit 0
          git push
