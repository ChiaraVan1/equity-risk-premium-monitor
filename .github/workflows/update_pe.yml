name: Auto Update QQQ PE Ratio

on:
  schedule:
    # 每天周一到周五 UTC 10:00 (北京时间 18:00)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: {}

jobs:
  update-pe:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright and fetch PE
        run: pip install playwright && playwright install chromium --with-deps

      - name: Fetch QQQ PE from GuruFocus
        id: fetch_pe
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import re, os

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto("https://www.gurufocus.com/economic_indicators/6778/nasdaq-100-pe-ratio", timeout=30000)
              page.wait_for_timeout(3000)

              # 从 h1 提取 PE 值，例如 "Nasdaq 100 PE Ratio : 37.02"
              title = page.title()
              print(f"Page title: {title}")
              match = re.search(r'PE Ratio[:\s]+([\d.]+)', title)
              if match:
                  pe = match.group(1)
                  print(f"PE={pe}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"pe={pe}\n")
              else:
                  print("Failed to extract PE from title")
                  exit(1)
              browser.close()
          EOF

      - name: Update GitHub Variable QQQ_PE_TODAY
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          PE="${{ steps.fetch_pe.outputs.pe }}"
          echo "Updating QQQ_PE_TODAY to $PE"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ChiaraVan1/equity-risk-premium-monitor/actions/variables/QQQ_PE_TODAY" \
            -d "{\"name\":\"QQQ_PE_TODAY\",\"value\":\"$PE\"}")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ QQQ_PE_TODAY updated to $PE"
          else
            echo "❌ Failed, HTTP $HTTP_CODE"
            exit 1
          fi
